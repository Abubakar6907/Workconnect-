<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Role - WorkConnect</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background: linear-gradient(135deg,#27ae60,#2ecc71);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* Container */
.container{
  text-align:center;
  width:100%;
  max-width:420px;
  padding:20px;
}

/* Logo */
.logo{
  width:80px;
  margin-bottom:10px;
}

/* Title */
h1{
  color:white;
  margin-bottom:20px;
}

/* Cards */
.card{
  background:white;
  padding:20px;
  margin:12px 0;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 6px 18px rgba(0,0,0,0.2);
  border-left:6px solid #27ae60;
}

.card:hover{
  transform:scale(1.04);
}

/* Heading */
.card h2{
  color:#27ae60;
  margin-bottom:8px;
}

/* Text */
.card p{
  color:#555;
  font-size:13px;
  line-height:1.5;
}

/* Button style inside */
.card .btn{
  margin-top:10px;
  display:inline-block;
  padding:8px 20px;
  background:#27ae60;
  color:white;
  border-radius:6px;
  font-size:13px;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">
<h1>Choose Your Role</h1>

<!-- WORKER -->
<div class="card" onclick="goWorker()">
  <h2>Worker</h2>
  <p>Turn your skills into income. Get jobs, build trust, and grow fast.</p>
  <div class="btn">Start as Worker</div>
</div>

<!-- EMPLOYER -->
<div class="card" onclick="goEmployer()">
  <h2>Employer</h2>
  <p>Hire trusted professionals easily. Fast, reliable, and stress-free.</p>
  <div class="btn">Hire a Worker</div>
</div>

</div>

<script>
function goWorker(){
  window.location.href = "worker.html";
}

function goEmployer(){
  window.location.href = "employer.html";
}
</script>

</body>
</html>
